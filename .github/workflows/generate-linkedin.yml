name: Generate LinkedIn Post

on:
  repository_dispatch:
    types: [generate-linkedin]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        run: npm install --no-save @anthropic-ai/sdk resend roughjs

      - name: Generate LinkedIn post and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DRAFT_SLUG: ${{ github.event.client_payload.slug }}
        run: node scripts/generate-linkedin.js
